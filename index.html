    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Loot - Town Square & Auctions (Secure & Transparent)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 復古遊戲像素風格核心 UI 樣式 */
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #121824;
            color: #e2e8f0;
        }
        
        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        /* 8-bit 邊框與陰影 */
        .pixel-border {
            border: 4px solid #000;
            box-shadow: 4px 4px 0px #000;
        }
        
        .pixel-border-sm {
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
        }

        .pixel-btn {
            border: 4px solid #000;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s ease;
            position: relative;
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        .pixel-btn-red { background-color: #f87171; color: black; }
        .pixel-btn-red:hover { background-color: #ef4444; }
        
        .pixel-btn-green { background-color: #10b981; color: white; }
        .pixel-btn-green:hover { background-color: #059669; }

        .pixel-btn-yellow { background-color: #f59e0b; color: black; }
        .pixel-btn-yellow:hover { background-color: #d97706; }

        .pixel-btn-purple { background-color: #8b5cf6; color: white; }
        .pixel-btn-purple:hover { background-color: #7c3aed; }

        .pixel-btn-blue { background-color: #3b82f6; color: white; }
        .pixel-btn-blue:hover { background-color: #2563eb; }

        /* HP 條動畫 */
        .hp-bar-fill {
            transition: width 0.5s linear;
        }

        /* 復古自訂滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border: 2px solid #0d1117;
        }

        /* 自訂像素網格背景 */
        .pixel-grid {
            background-size: 20px 20px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
        }
    </style>

    <script>
        window.PIXEL_LOOT_API_BASE_URL = 'https://pixel-loot-backend-production.up.railway.app';
    </script>
    <script src="config.js"></script> 
</head>

<script>
    // 1. 获取正确的 API 基准 URL，确保其能跨页面通信

    // 2. 页面标签切换逻辑 (Tab Switching)
    function changeTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(section => {
            section.classList.add('hidden');
        });
        
        const tabButtons = ['town', 'auctions', 'my-quests', 'guild-merchant', 'profile'];
        tabButtons.forEach(id => {
            const btn = document.getElementById(`tab-${id}`);
            if (btn) {
                btn.className = "pixel-btn bg-slate-700 text-slate-300 px-4 py-2 text-sm pixel-font";
            }
        });

        const activeSection = document.getElementById(`sect-${tabId}`);
        if (activeSection) {
            activeSection.classList.remove('hidden');
        }

        const activeBtn = document.getElementById(`tab-${tabId}`);
        if (activeBtn) {
            if (tabId === 'town') activeBtn.className = "pixel-btn pixel-btn-green px-4 py-2 text-sm pixel-font";
            else if (tabId === 'auctions') activeBtn.className = "pixel-btn pixel-btn-purple px-4 py-2 text-sm pixel-font";
            else activeBtn.className = "pixel-btn pixel-btn-yellow px-4 py-2 text-sm pixel-font";
        }

        if (tabId === 'town') {
            fetchShopItems();
        }
    }
