### 3. 修复 `library.html`

请打开 **`library.html`**，同样将最顶部的头部配置修改为如下代码（**关键点：同样补上了网址的单引号**）：

```html
<!DOCTYPE html>
<html lang="tw">
<head>
    <script>
        // 修正：为 Railway 后端网址加上了单引号包裹，防止报错崩溃
        window.PIXEL_LOOT_API_BASE_URL = 'https://pixel-loot-backend-production.up.railway.app';
    </script>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Loot - Guild Library (Admin Dashboard)</title>
    ```

---

### 💡 总结修复的核心逻辑：
1. `index new.html` 之前没有被 `<script>` 标签包裹，导致里面的跳转控制函数 `changeTab` 等全部失效；现在包裹后，点击导航按钮就能正常工作了。
2. `login.html` 和 `library.html` 里的后端网址没有加引号，这在 JavaScript 中属于严重的语法错误（SyntaxError），会导致浏览器直接终止运行当前页面上的所有脚本。加上引号后，全站的后端 API 数据连接和跳转逻辑就会全面恢复正常。
